<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>五子棋</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>五子棋</h1>
          <p class="hint">Tauri 桌面与 Android 双端</p>
        </div>
        <div class="mode-switch" aria-label="对战模式">
          <button id="local-mode" type="button">同机双人</button>
          <button id="online-mode" type="button">在线房间</button>
        </div>
      </header>

      <section class="layout">
        <div class="board-shell">
          <canvas id="board" tabindex="0" role="application" aria-label="五子棋棋盘"></canvas>
        </div>

        <aside class="panel">
          <div class="status-card" aria-live="polite">
            <p id="identity">同机双人</p>
            <p id="status">轮到黑方</p>
          </div>

          <div id="online-panel" hidden>
            <label class="field">
              服务器地址
              <input id="server-url" value="ws://127.0.0.1:8787" inputmode="url" autocomplete="url" />
            </label>
            <label class="field">
              房间号
              <input id="room-code" value="GOMOKU" maxlength="20" autocomplete="off" />
            </label>
            <div class="actions">
              <button id="connect" class="primary" type="button">连接</button>
              <button id="disconnect" type="button" disabled>断开</button>
            </div>
          </div>

          <button id="reset" type="button">重新开局</button>
          <p class="hint">触屏或鼠标点击落子；键盘可用方向键选择，空格或回车落子。Android 真机联机时填写服务器的局域网或公网 WSS 地址。</p>
        </aside>
      </section>
    </main>
  </body>
</html>
