name: Build installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: bun install --frozen-lockfile
      - run: bun run tauri build --bundles nsis
      - uses: actions/upload-artifact@v7
        with:
          name: gomoku-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager 'platforms;android-36' 'build-tools;36.0.0' 'ndk;28.2.13676358'
          echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"
      - run: bun install --frozen-lockfile
      - run: bun run android:build -- --debug --apk --target aarch64
      - name: Prepare ARM64 APK
        shell: bash
        run: |
          mkdir -p release-assets
          apk="$(find src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' -print -quit)"
          test -n "$apk"
          cp "$apk" release-assets/Gomoku_arm64-v8a-debug.apk
      - uses: actions/upload-artifact@v7
        with:
          name: gomoku-android-apk
          path: release-assets/Gomoku_arm64-v8a-debug.apk
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: gomoku-windows-exe
          path: release-assets/windows
      - uses: actions/download-artifact@v8
        with:
          name: gomoku-android-apk
          path: release-assets/android
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -t assets < <(find release-assets -type f \( -name '*.exe' -o -name '*.apk' \))
          test "${#assets[@]}" -gt 0
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "Gomoku $GITHUB_REF_NAME"
